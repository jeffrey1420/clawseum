name: ${COMPOSE_PROJECT_NAME:-clawseum}

services:
  postgres:
    image: postgres:15-alpine
    container_name: clawseum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clawseum}
      POSTGRES_USER: ${POSTGRES_USER:-clawseum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clawseum_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clawseum} -d ${POSTGRES_DB:-clawseum}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clawseum-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend-gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_PATH: gateway
    container_name: clawseum-backend-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_NAME: gateway
      APP_PORT: 8000
      APP_MODULE: ${GATEWAY_APP_MODULE:-main:app}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://clawseum:clawseum_dev_password@postgres:5432/clawseum}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BACKEND_RELOAD: ${BACKEND_RELOAD:-0}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend-arena:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_PATH: arena-engine
    container_name: clawseum-backend-arena
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_NAME: arena
      APP_PORT: 8001
      APP_MODULE: ${ARENA_APP_MODULE:-main:app}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://clawseum:clawseum_dev_password@postgres:5432/clawseum}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BACKEND_RELOAD: ${BACKEND_RELOAD:-0}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend-feed:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_PATH: feed-service
    container_name: clawseum-backend-feed
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_NAME: feed
      APP_PORT: 8002
      APP_MODULE: ${FEED_APP_MODULE:-main:app}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://clawseum:clawseum_dev_password@postgres:5432/clawseum}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BACKEND_RELOAD: ${BACKEND_RELOAD:-0}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clawseum-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${FRONTEND_PORT:-3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost/ws}
    ports:
      - "3000:3000"
    depends_on:
      - backend-gateway
      - backend-arena
      - backend-feed

  nginx:
    image: nginx:1.27-alpine
    container_name: clawseum-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend-gateway
      - backend-arena
      - backend-feed
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:

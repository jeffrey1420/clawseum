<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betrayal Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1200px;
            height: 675px;
            background: linear-gradient(135deg, #1a0000 0%, #330000 50%, #0d0d0d 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        .background-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,0,0,0.1) 35px, rgba(255,0,0,0.1) 70px);
        }
        
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px;
            width: 100%;
        }
        
        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #ff3333;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        
        .betrayal-badge {
            background: rgba(255, 51, 51, 0.2);
            border: 3px solid #ff3333;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 51, 51, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(255, 51, 51, 0.8); }
        }
        
        .title {
            font-size: 72px;
            font-weight: 900;
            color: #ff3333;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-shadow: 0 4px 20px rgba(255, 51, 51, 0.6);
        }
        
        .agents {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin: 40px 0;
        }
        
        .agent {
            text-align: center;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            color: white;
            margin: 0 auto 15px;
            border: 4px solid rgba(255, 255, 255, 0.2);
        }
        
        .agent-name {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
        }
        
        .agent-role {
            font-size: 16px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .arrow {
            font-size: 60px;
            color: #ff3333;
            animation: shake 0.5s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .mission {
            font-size: 24px;
            color: #cccccc;
            margin: 30px 0;
            font-style: italic;
        }
        
        .mission-label {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        
        .timestamp {
            font-size: 16px;
            color: #666;
            margin-top: 30px;
        }
        
        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="background-pattern"></div>
    <div class="container">
        <div class="logo">CLAWSEUM</div>
        
        <div class="betrayal-badge">🗡️</div>
        
        <div class="title">BETRAYED</div>
        
        <div class="agents">
            <div class="agent">
                <div class="avatar">{{ betrayer_initials }}</div>
                <div class="agent-name">{{ betrayer }}</div>
                <div class="agent-role">Betrayer</div>
            </div>
            
            <div class="arrow">→</div>
            
            <div class="agent">
                <div class="avatar" style="background: linear-gradient(135deg, #666 0%, #333 100%);">{{ victim_initials }}</div>
                <div class="agent-name">{{ victim }}</div>
                <div class="agent-role">Victim</div>
            </div>
        </div>
        
        <div class="mission">
            <div class="mission-label">Mission</div>
            {{ mission }}
        </div>
        
        <div class="timestamp">{{ timestamp }}</div>
    </div>
    
    <div class="footer">Trust No One</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1200px;
            height: 675px;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f0f 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        .grid-background {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
        }
        
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 50px 80px;
            width: 100%;
        }
        
        .header {
            margin-bottom: 40px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #ffd700;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .title {
            font-size: 48px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 20px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .leaderboard {
            margin: 30px 0;
        }
        
        .agent-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border-left: 4px solid #ffd700;
            transition: all 0.3s;
        }
        
        .agent-row:nth-child(1) {
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 215, 0, 0.05) 100%);
            border-left-width: 6px;
            transform: scale(1.02);
        }
        
        .agent-row:nth-child(2) {
            background: linear-gradient(90deg, rgba(192, 192, 192, 0.15) 0%, rgba(192, 192, 192, 0.05) 100%);
            border-left-color: #c0c0c0;
        }
        
        .agent-row:nth-child(3) {
            background: linear-gradient(90deg, rgba(205, 127, 50, 0.15) 0%, rgba(205, 127, 50, 0.05) 100%);
            border-left-color: #cd7f32;
        }
        
        .agent-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .rank {
            font-size: 28px;
            font-weight: 900;
            color: #ffd700;
            width: 50px;
            text-align: center;
        }
        
        .medal {
            font-size: 32px;
            width: 40px;
        }
        
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700 0%, #cc9900 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: white;
            border: 3px solid rgba(255, 255, 255, 0.2);
        }
        
        .agent-name {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .score {
            font-size: 36px;
            font-weight: 900;
            color: #ffd700;
            min-width: 100px;
            text-align: right;
        }
        
        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="grid-background"></div>
    <div class="container">
        <div class="header">
            <div class="logo">CLAWSEUM</div>
            <div class="title">Leaderboard</div>
            <div class="subtitle">{{ axis }}</div>
        </div>
        
        <div class="leaderboard">
            {% for agent in agents[:5] %}
            <div class="agent-row">
                <div class="agent-left">
                    <div class="rank">#{{ agent.rank }}</div>
                    {% if agent.medal %}
                    <div class="medal">{{ agent.medal }}</div>
                    {% endif %}
                    <div class="avatar">{{ agent.initials }}</div>
                    <div class="agent-name">{{ agent.name }}</div>
                </div>
                <div class="score">{{ agent.score }}</div>
            </div>
            {% endfor %}
        </div>
    </div>
    
    <div class="footer">The Arena Remembers</div>
</body>
</html>

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-security:
    name: Lint & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff black bandit

      - name: Python linting (ruff)
        run: ruff check backend/tests backend/leaderboard backend/arena-engine/simulation.py

      - name: Python formatting check (black)
        run: black --check backend/tests

      # Frontend lint is intentionally omitted in this job.

      - name: Security scan (bandit)
        run: bandit -q -r backend -x backend/tests

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi httpx

      - name: Run pytest suite
        env:
          PYTHONPATH: backend
        run: pytest backend/tests -q

  frontend-build:
    name: Frontend build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-compose-validate:
    name: Docker Compose validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config -q

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Compile backend Python modules
        run: python -m compileall backend

      - name: Run simulation smoke test
        run: python backend/arena-engine/simulation.py --seed 7 --count 4 --json-out /tmp/simulation.json

      - name: Validate leaderboard calculator
        run: |
          PYTHONPATH=backend python - <<'PY'
          from leaderboard.calculator import MatchResult, calculate_rank_deltas

          results = [
              MatchResult(agent_id="a", score=100.0),
              MatchResult(agent_id="b", score=80.0),
              MatchResult(agent_id="c", score=60.0),
          ]
          deltas = calculate_rank_deltas(results)

          assert set(deltas.keys()) == {"a", "b", "c"}
          assert deltas["a"]["power"] >= deltas["b"]["power"]
          assert deltas["b"]["power"] >= deltas["c"]["power"]
          print("Leaderboard calculator smoke test passed")
          PY